name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  fmt:
    name: Format checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"
          components: rustfmt

      - name: cargo fmt (workspace)
        run: cargo fmt --all --check

      - name: cargo fmt (generic_call_circuit)
        working-directory: generic_call_circuit
        run: cargo fmt --all --check

      - name: Install taplo
        uses: taiki-e/install-action@v2
        with:
          tool: taplo-cli

      - name: taplo fmt
        run: taplo fmt --check

  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            generic_call_circuit

      - name: cargo build (workspace)
        run: cargo build --workspace --all-targets

      - name: cargo build (generic_call_circuit)
        working-directory: generic_call_circuit
        run: cargo build --all-targets

      - name: cargo test (generic_call_circuit)
        working-directory: generic_call_circuit
        run: cargo test -- --nocapture
